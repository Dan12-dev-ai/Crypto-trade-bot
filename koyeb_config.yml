# Koyeb Configuration for UOTA Elite v2
# World-First Autonomous Quant Operating System

name: uota-elite-v2
version: "2.0.0"

# Service Definition
services:
  - name: orchestrator
    type: web
    env:
      - name: PYTHONUNBUFFERED
        value: "1"
      - name: TZ
        value: "UTC"
      - name: OLLAMA_BASE_URL
        value: "${OLLAMA_BASE_URL}"
      - name: CHROMA_HOST
        value: "${CHROMA_HOST}"
      - name: CHROMA_PORT
        value: "8000"
      - name: REDIS_URL
        value: "${REDIS_URL}"
      - name: POSTGRES_URL
        value: "${POSTGRES_URL}"
      - name: RABBITMQ_URL
        value: "${RABBITMQ_URL}"
      - name: LOG_LEVEL
        value: "${LOG_LEVEL:-INFO}"
      - name: PRODUCTION_MODE
        value: "${PRODUCTION_MODE:-true}"
      - name: SECURITY_LEVEL
        value: "${SECURITY_LEVEL:-HIGH}"
      - name: EXCHANGE_API_KEY
        secret: true
      - name: EXCHANGE_API_SECRET
        secret: true
      - name: TELEGRAM_BOT_TOKEN
        secret: true
      - name: TELEGRAM_CHAT_ID
        secret: true
      - name: POSTGRES_PASSWORD
        secret: true
      - name: RABBITMQ_USER
        secret: true
      - name: RABBITMQ_PASSWORD
        secret: true
      - name: GRAFANA_USER
        secret: true
      - name: GRAFANA_PASSWORD
        secret: true
      - name: AWS_ACCESS_KEY_ID
        secret: true
      - name: AWS_SECRET_ACCESS_KEY
        secret: true
      - name: S3_BUCKET
        value: "${S3_BUCKET}"
    build:
      context: .
      dockerfile: Dockerfile.koyeb
    ports:
      - port: 8501
        path: /
        protocol: http
      - port: 8080
        path: /api
        protocol: http
      - port: 9090
        path: /metrics
        protocol: http
    resources:
      cpu:
        min: 1000m
        max: 4000m
      memory:
        min: 2Gi
        max: 8Gi
    health_check:
      http:
        path: /health
        port: 8080
        initial_delay: 60s
        interval: 30s
        timeout: 10s
        retries: 3
    auto_deploy: true
    regions:
      - was  # US West
      - fra  # Europe
      - sin  # Singapore

  # Vector Memory Service
  - name: chroma
    type: web
    env:
      - name: CHROMA_SERVER_HOST
        value: "0.0.0.0"
      - name: CHROMA_SERVER_HTTP_PORT
        value: "8000"
      - name: CHROMA_SERVER_CORS_ALLOW_ORIGINS
        value: "*"
      - name: ANONYMIZED_TELEMETRY
        value: "False"
      - name: PERSIST_DIRECTORY
        value: "/chroma/chroma"
    image: chromadb/chroma:latest
    ports:
      - port: 8000
        path: /
        protocol: http
    resources:
      cpu:
        min: 500m
        max: 2000m
      memory:
        min: 1Gi
        max: 4Gi
    health_check:
      http:
        path: /api/v1/heartbeat
        port: 8000
        initial_delay: 30s
        interval: 30s
        timeout: 10s
        retries: 3
    regions:
      - was
      - fra
      - sin

  # LLM Service
  - name: ollama
    type: web
    env:
      - name: OLLAMA_HOST
        value: "0.0.0.0"
      - name: OLLAMA_PORT
        value: "11434"
      - name: OLLAMA_ORIGINS
        value: "*"
      - name: OLLAMA_MAX_LOADED_MODELS
        value: "3"
      - name: OLLAMA_NUM_PARALLEL
        value: "2"
    image: ollama/ollama:latest
    ports:
      - port: 11434
        path: /
        protocol: http
    resources:
      cpu:
        min: 2000m
        max: 8000m
      memory:
        min: 4Gi
        max: 16Gi
    health_check:
      http:
        path: /api/tags
        port: 11434
        initial_delay: 60s
        interval: 30s
        timeout: 10s
        retries: 3
    regions:
      - was
      - fra
      - sin
    volumes:
      - name: ollama-data
        mount: /root/.ollama
        size: 20Gi

  # Database Service
  - name: postgres
    type: service
    env:
      - name: POSTGRES_DB
        value: "uota_trading"
      - name: POSTGRES_USER
        value: "uota_user"
      - name: POSTGRES_PASSWORD
        secret: true
      - name: POSTGRES_INITDB_ARGS
        value: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
      - name: PGDATA
        value: "/var/lib/postgresql/data/pgdata"
    image: postgres:15-alpine
    ports:
      - port: 5432
        protocol: tcp
    resources:
      cpu:
        min: 500m
        max: 2000m
      memory:
        min: 1Gi
        max: 4Gi
    health_check:
      tcp:
        port: 5432
        initial_delay: 30s
        interval: 30s
        timeout: 10s
        retries: 3
    volumes:
      - name: postgres-data
        mount: /var/lib/postgresql/data
        size: 50Gi
    regions:
      - was
      - fra
      - sin

  # Cache Service
  - name: redis
    type: service
    env:
      - name: REDIS_ARGS
        value: "--appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru --save 900 1 --save 300 10 --save 60 10000"
    image: redis:7-alpine
    ports:
      - port: 6379
        protocol: tcp
    resources:
      cpu:
        min: 250m
        max: 1000m
      memory:
        min: 512Mi
        max: 2Gi
    health_check:
      tcp:
        port: 6379
        initial_delay: 30s
        interval: 30s
        timeout: 10s
        retries: 3
    volumes:
      - name: redis-data
        mount: /data
        size: 10Gi
    regions:
      - was
      - fra
      - sin

# Instance Types
instance_types:
  - name: nano
    cpu: 250m
    memory: 512Mi
    price: 0.0035
  - name: micro
    cpu: 500m
    memory: 1Gi
    price: 0.007
  - name: small
    cpu: 1000m
    memory: 2Gi
    price: 0.014
  - name: medium
    cpu: 2000m
    memory: 4Gi
    price: 0.028
  - name: large
    cpu: 4000m
    memory: 8Gi
    price: 0.056
  - name: xlarge
    cpu: 8000m
    memory: 16Gi
    price: 0.112

# Deployment Configuration
deployment:
  strategy: rolling
  min_ready_instances: 1
  max_unavailable_instances: 0
  health_check_grace_period: 60s
  termination_grace_period: 30s

# Auto-scaling
autoscaling:
  enabled: true
  min_instances: 1
  max_instances: 5
  target_cpu_utilization: 70
  target_memory_utilization: 80
  scale_up_cooldown: 300s
  scale_down_cooldown: 600s

# Monitoring
monitoring:
  enabled: true
  metrics:
    - cpu
    - memory
    - network
    - disk
  alerts:
    - name: high_cpu
      condition: cpu > 80
      duration: 5m
      action: scale_up
    - name: high_memory
      condition: memory > 85
      duration: 5m
      action: scale_up
    - name: service_down
      condition: health_check_failed
      duration: 2m
      action: restart

# Security
security:
  enabled: true
  firewall:
    enabled: true
    rules:
      - port: 80
        protocol: tcp
        source: 0.0.0.0/0
      - port: 443
        protocol: tcp
        source: 0.0.0.0/0
      - port: 8080
        protocol: tcp
        source: 0.0.0.0/0
      - port: 8501
        protocol: tcp
        source: 0.0.0.0/0
  ssl:
    enabled: true
    certificate: "${SSL_CERTIFICATE}"
    private_key: "${SSL_PRIVATE_KEY}"
    auto_renew: true

# Backup
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  retention: 30  # days
  destinations:
    - type: s3
      bucket: "${S3_BUCKET}"
      region: "${AWS_REGION:-us-east-1}"
      access_key: "${AWS_ACCESS_KEY_ID}"
      secret_key: "${AWS_SECRET_ACCESS_KEY}"
    - type: gcs
      bucket: "${GCS_BUCKET}"
      credentials: "${GCS_CREDENTIALS}"

# Environment Variables
environments:
  development:
    name: development
    variables:
      LOG_LEVEL: DEBUG
      PRODUCTION_MODE: false
      SECURITY_LEVEL: MEDIUM
      ORCHESTRATOR_REPLICAS: 1
      AUTO_SCALING_ENABLED: false

  staging:
    name: staging
    variables:
      LOG_LEVEL: INFO
      PRODUCTION_MODE: false
      SECURITY_LEVEL: HIGH
      ORCHESTRATOR_REPLICAS: 2
      AUTO_SCALING_ENABLED: true

  production:
    name: production
    variables:
      LOG_LEVEL: WARNING
      PRODUCTION_MODE: true
      SECURITY_LEVEL: CRITICAL
      ORCHESTRATOR_REPLICAS: 3
      AUTO_SCALING_ENABLED: true
      MIN_INSTANCES: 2
      MAX_INSTANCES: 10

# CI/CD Pipeline
pipeline:
  stages:
    - name: build
      steps:
        - name: build_image
          command: docker build -f Dockerfile.koyeb -t uota-elite-v2 .
        - name: run_tests
          command: |
            python -m pytest tests/ -v --cov=. --cov-report=xml
        - name: security_scan
          command: |
            python -m bandit -r . -f json -o security-report.json
            python -m safety check --json --output safety-report.json
    
    - name: deploy_staging
      condition: branch == main
      steps:
        - name: deploy
          command: koyeb deploy --env staging
        - name: health_check
          command: |
            curl -f https://staging.uota-elite-v2.koyeb.app/health
    
    - name: deploy_production
      condition: tag == v*
      steps:
        - name: deploy
          command: koyeb deploy --env production
        - name: health_check
          command: |
            curl -f https://uota-elite-v2.koyeb.app/health
        - name: notify
          command: |
            curl -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=🚀 UOTA Elite v2 deployed to production!"

# Performance Optimization
optimization:
  enabled: true
  strategies:
    - name: cache_optimization
      enabled: true
      config:
        redis_ttl: 3600
        cache_size: 1gb
    - name: connection_pooling
      enabled: true
      config:
        max_connections: 100
        connection_timeout: 30
    - name: resource_limits
      enabled: true
      config:
        max_memory_per_process: 2gb
        max_cpu_per_process: 1000m

# Disaster Recovery
disaster_recovery:
  enabled: true
  regions:
    - primary: was
      backup: fra
    - primary: fra
      backup: sin
    - primary: sin
      backup: was
  failover:
    enabled: true
    health_check_interval: 30s
    failover_timeout: 300s
    automatic_failback: false
    data_replication: true
    rpo: 5m  # Recovery Point Objective
    rto: 10m  # Recovery Time Objective

# Compliance
compliance:
  enabled: true
  standards:
    - gdpr
    - soc2
    - iso27001
  data_encryption:
    at_rest: true
    in_transit: true
    key_rotation: true
  audit_logging:
    enabled: true
    retention: 365  # days
    log_format: json
  access_control:
    mfa_enabled: true
    ip_whitelist_enabled: true
    session_timeout: 3600  # seconds
