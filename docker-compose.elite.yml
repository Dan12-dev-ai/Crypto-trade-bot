version: '3.8'

services:
  # Main Orchestrator - Central Decision Engine
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.elite
    container_name: uota_orchestrator
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=UTC
      - OLLAMA_BASE_URL=http://ollama:11434
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379
      - POSTGRES_URL=postgresql://uota_user:${POSTGRES_PASSWORD}@postgres:5432/uota_trading
      - RABBITMQ_URL=amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/uota_vhost
      - LOG_LEVEL=INFO
      - PRODUCTION_MODE=${PRODUCTION_MODE:-false}
      - SECURITY_LEVEL=${SECURITY_LEVEL:-HIGH}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config:ro
      - ./memory:/app/memory
      - ./simulation:/app/simulation
      - ./research:/app/research
      - ./execution:/app/execution
      - ./security:/app/security
    ports:
      - "8501:8501"  # Dashboard
      - "8080:8080"  # API
      - "9090:9090"  # Metrics
    depends_on:
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - uota_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: ${ORCHESTRATOR_REPLICAS:-1}
      resources:
        limits:
          cpus: ${ORCHESTRATOR_CPU_LIMIT:-2.0}
          memory: ${ORCHESTRATOR_MEM_LIMIT:-4G}
        reservations:
          cpus: ${ORCHESTRATOR_CPU_RESERVE:-1.0}
          memory: ${ORCHESTRATOR_MEM_RESERVE:-2G}

  # Vector Memory - ChromaDB
  chroma:
    image: chromadb/chroma:latest
    container_name: uota_chroma
    restart: unless-stopped
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_HTTP_PORT=8000
      - CHROMA_SERVER_CORS_ALLOW_ORIGINS=*
      - ANONYMIZED_TELEMETRY=False
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8000:8000"
    networks:
      - uota_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # LLM Service - Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: uota_ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_PORT=11434
      - OLLAMA_ORIGINS=*
      - OLLAMA_MAX_LOADED_MODELS=3
      - OLLAMA_NUM_PARALLEL=2
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - uota_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Cache Service - Redis
  redis:
    image: redis:7-alpine
    container_name: uota_redis
    restart: unless-stopped
    command: |
      redis-server 
      --appendonly yes 
      --maxmemory 1gb 
      --maxmemory-policy allkeys-lru 
      --save 900 1 
      --save 300 10 
      --save 60 10000
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - uota_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Database - PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: uota_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=uota_trading
      - POSTGRES_USER=uota_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./database/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      - uota_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "uota_user", "-d", "uota_trading"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Message Queue - RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: uota_rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=uota_vhost
      - RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS=-rabbit disk_free_limit.absolute 1GB
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./monitoring/rabbitmq_definitions.json:/etc/rabbitmq/definitions.json:ro
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672"  # Management UI
    networks:
      - uota_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: uota_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - uota_network
    depends_on:
      - orchestrator
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Visualization - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: uota_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_SECURITY_CONTENT_SECURITY_POLICY_TEMPLATE=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3000:3000"
    networks:
      - uota_network
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Log Aggregation - ELK Stack
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: uota_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.monitoring.collection.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - uota_network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: uota_logstash
    restart: unless-stopped
    volumes:
      - ./monitoring/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logs:/app/logs:ro
    ports:
      - "5044:5044"
    networks:
      - uota_network
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: uota_kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
    volumes:
      - kibana_data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    networks:
      - uota_network
    depends_on:
      - elasticsearch
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: uota_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - uota_network
    depends_on:
      - orchestrator
      - grafana
      - kibana
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Backup Service
  backup:
    image: alpine:latest
    container_name: uota_backup
    restart: unless-stopped
    environment:
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - S3_BUCKET=${S3_BUCKET}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./data:/backup/data:ro
      - ./logs:/backup/logs:ro
      - ./memory:/backup/memory:ro
      - ./security:/backup/security:ro
    command: |
      sh -c "
        apk add --no-cache aws-cli curl
        echo 'Creating backup script...'
        cat > /backup.sh << 'EOF'
        #!/bin/sh
        DATE=\$(date +%Y%m%d_%H%M%S)
        BACKUP_DIR=\"s3://\${S3_BUCKET}/backup_\${DATE}\"
        
        # Create backup
        echo \"Starting backup at \${DATE}\"
        aws s3 sync /backup/data \${BACKUP_DIR}/data/
        aws s3 sync /backup/logs \${BACKUP_DIR}/logs/
        aws s3 sync /backup/memory \${BACKUP_DIR}/memory/
        aws s3 sync /backup/security \${BACKUP_DIR}/security/
        
        # Clean old backups
        echo \"Cleaning old backups...\"
        aws s3 ls s3://\${S3_BUCKET}/ | while read -r line; do
          BACKUP_DATE=\$(echo \$line | awk '{print \$2}' | cut -d'_' -f2 | cut -d'/' -f1)
          if [ ! -z \"\$BACKUP_DATE\" ]; then
            BACKUP_EPOCH=\$(date -d \"\$BACKUP_DATE\" +%s 2>/dev/null || echo 0)
            CURRENT_EPOCH=\$(date +%s)
            DAYS_OLD=\$(((CURRENT_EPOCH - BACKUP_EPOCH) / 86400))
            
            if [ \$DAYS_OLD -gt \${BACKUP_RETENTION_DAYS} ]; then
              echo \"Deleting old backup: \$line\"
              aws s3 rm s3://\${S3_BUCKET}/\$line --recursive
            fi
          fi
        done
        
        echo \"Backup completed at \$(date)\"
        EOF
        chmod +x /backup.sh
        echo \"Setting up cron job: \${BACKUP_SCHEDULE}\"
        echo \"\${BACKUP_SCHEDULE} /backup.sh >> /var/log/backup.log 2>&1\" | crontab -
        crond -f -l 2
      "
    networks:
      - uota_network
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # Watchdog Service
  watchdog:
    build:
      context: .
      dockerfile: Dockerfile.watchdog
    container_name: uota_watchdog
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - WATCHDOG_INTERVAL=30
      - MAX_RESTART_ATTEMPTS=10
      - HEALTH_CHECK_ENDPOINT=http://orchestrator:8080/health
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - uota_network
    depends_on:
      - orchestrator
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  uota_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

volumes:
  chroma_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/vector_memory
  ollama_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local
  kibana_data:
    driver: local

# Production overrides
---
version: '3.8'

services:
  orchestrator:
    deploy:
      replicas: ${ORCHESTRATOR_REPLICAS:-3}
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    environment:
      - LOG_LEVEL=WARNING
      - PRODUCTION_MODE=true
      - SECURITY_LEVEL=CRITICAL

  chroma:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  ollama:
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 16G
        reservations:
          cpus: '4.0'
          memory: 8G

  postgres:
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  redis:
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
